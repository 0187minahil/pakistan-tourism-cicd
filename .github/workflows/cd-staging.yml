name: cd-staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:staging-latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:staging-latest

      - name: Trigger Render
        run: curl "$RENDER_URL"
        env:
          RENDER_URL: ${{ secrets.RENDER_DEPLOY_HOOK_STAGING_URL }}
