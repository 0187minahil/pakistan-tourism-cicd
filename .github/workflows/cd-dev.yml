name: cd-dev

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:dev-latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:dev-latest

      - name: Deploy Render
        run: curl "$RENDER_URL"
        env:
          RENDER_URL: ${{ secrets.RENDER_DEPLOY_HOOK_DEV_URL }}
